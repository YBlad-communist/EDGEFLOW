<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdgeFloww — Crypto Course Marketplace</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e0e0e0; }
    a { color: #7c5cfc; text-decoration: none; }
    input, textarea, select { background: #1a1a2e; border: 1px solid #2a2a4a; color: #e0e0e0; padding: 10px 14px; border-radius: 8px; font-size: 14px; width: 100%; outline: none; transition: border 0.2s; }
    input:focus, textarea:focus, select:focus { border-color: #7c5cfc; }
    button { cursor: pointer; font-size: 14px; transition: all 0.2s; }
    img { max-width: 100%; border-radius: 8px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; font-size: 14px; }
    .btn-primary { background: #7c5cfc; color: #fff; }
    .btn-primary:hover { background: #6a4de6; }
    .btn-secondary { background: #1a1a2e; color: #e0e0e0; border: 1px solid #2a2a4a; }
    .btn-secondary:hover { background: #2a2a4a; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-block { width: 100%; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .card { background: #12121f; border: 1px solid #1e1e35; border-radius: 12px; padding: 16px; transition: transform 0.2s, border-color 0.2s; }
    .card:hover { border-color: #2a2a5a; }
    .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-green { background: #1a3a2a; color: #4ade80; }
    .badge-yellow { background: #3a3a1a; color: #facc15; }
    .badge-blue { background: #1a2a4a; color: #60a5fa; }
    .badge-red { background: #3a1a1a; color: #f87171; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .flex { display: flex; }
    .flex-1 { flex: 1; }
    .gap-2 { gap: 8px; }
    .gap-4 { gap: 16px; }
    .mb-4 { margin-bottom: 16px; }
    .mt-4 { margin-top: 16px; }
    .text-center { text-align: center; }
    .text-secondary { color: #888; font-size: 13px; }
    .empty-state { text-align: center; padding: 60px 20px; color: #666; }
    .empty-state h2 { font-size: 48px; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal-content { background: #12121f; border: 1px solid #1e1e35; border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .navbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #12121f; border-bottom: 1px solid #1e1e35; position: sticky; top: 0; z-index: 50; }
    .logo { font-size: 20px; font-weight: 800; color: #7c5cfc; }
    .nav-links { display: flex; align-items: center; gap: 12px; }
    .page { min-height: calc(100vh - 60px); padding: 24px 16px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #aaa; }
    .course-card .price { font-size: 18px; font-weight: 800; color: #7c5cfc; }
    .course-card .title { font-size: 16px; font-weight: 700; margin: 8px 0; }
    .course-card .meta { font-size: 13px; color: #888; }
    .course-header { display: flex; gap: 24px; margin-bottom: 24px; flex-wrap: wrap; }
    .course-header .info { flex: 1; min-width: 280px; }
    .course-header .cover { width: 100%; max-width: 400px; aspect-ratio: 16/9; object-fit: cover; border-radius: 12px; }
    .lesson-list { list-style: none; }
    .lesson-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #1e1e35; }
    .lesson-item:last-child { border-bottom: none; }
    .lesson-item .lesson-num { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: #1a1a2e; font-size: 13px; font-weight: 700; margin-right: 12px; flex-shrink: 0; }
    .video-container { width: 100%; max-width: 900px; margin: 0 auto; }
    .video-container video { width: 100%; border-radius: 12px; background: #000; }
    .review-card { padding: 12px 0; border-bottom: 1px solid #1e1e35; }
    .review-card:last-child { border-bottom: none; }
    .review-card .stars { color: #facc15; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .stat-card { background: #12121f; border: 1px solid #1e1e35; border-radius: 12px; padding: 16px; text-align: center; }
    .stat-card .value { font-size: 24px; font-weight: 800; color: #7c5cfc; }
    .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th, .admin-table td { text-align: left; padding: 12px; border-bottom: 1px solid #1e1e35; }
    .admin-table th { font-size: 12px; color: #888; text-transform: uppercase; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.3s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
