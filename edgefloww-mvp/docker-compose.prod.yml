version: "3.8"

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - edgeflow_net

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    networks:
      - edgeflow_net

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - edgeflow_net

volumes:
  mongo_data:

networks:
  edgeflow_net:
    driver: bridge
